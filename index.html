<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중학교 수학 수업 - 발표자 뽑기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Pretendard', sans-serif; }
        .container { max-width: 600px; margin-top: 50px; }
        #display-area { 
            height: 200px; display: flex; align-items: center; justify-content: center; 
            font-size: 4rem; font-weight: bold; color: #0d6efd; 
            background: white; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px;
            transition: all 0.2s;
        }
        .remaining-badge { font-size: 1rem; padding: 10px 15px; border-radius: 20px; }
        .btn-lg { padding: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container text-center">
    <h2 class="mb-4">📐 수학시간 발표자 뽑기</h2>
    
    <audio id="bgm" src="bgm.mp3" loop></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

    <div class="row g-2 mb-4">
        <div class="col-8">
            <select id="classSelect" class="form-select form-select-lg" onchange="loadClassData()">
                <option value="1">1학년 1반</option>
                <option value="2">1학년 2반</option>
                <option value="3">1학년 3반</option>
            </select>
        </div>
        <div class="col-4">
            <button class="btn btn-outline-secondary w-100 btn-lg" data-bs-toggle="modal" data-bs-target="#setupModal">명단 설정</button>
        </div>
    </div>

    <div id="display-area">준비 완료!</div>
    
    <div class="mb-4">
        <span class="badge bg-dark remaining-badge">남은 인원: <span id="count">0</span>명</span>
    </div>

    <div class="d-grid gap-3">
        <button onclick="pick()" id="pickBtn" class="btn btn-primary btn-lg shadow">학생 뽑기</button>
        <div class="btn-group shadow-sm">
            <button onclick="resetCurrentClass()" class="btn btn-warning">초기화</button>
            <input type="checkbox" class="btn-check" id="removeOption" checked>
            <label class="btn btn-outline-danger" for="removeOption">한 번 뽑힌 학생 제외</label>
        </div>
    </div>
</div>

<div class="modal fade" id="setupModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">반별 명단 입력</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-start">
        <p class="small text-muted">학생 이름을 띄어쓰기나 쉼표로 구분해 넣어주세요. (예: 김철수, 이영희, 박지성)</p>
        <textarea id="rawNames" class="form-control" rows="10"></textarea>
      </div>
      <div class="modal-footer">
        <button onclick="saveNames()" class="btn btn-primary w-100" data-bs-dismiss="modal">저장 후 적용</button>
      </div>
    </div>
  </div>
</div>

<script>
    // 데이터 구조: { "1": [이름들], "2": [이름들] ... }
    let allData = JSON.parse(localStorage.getItem('mathClassData')) || { "1": [], "2": [], "3": [] };
    let currentRemaining = [];

    function saveNames() {
        const classNum = document.getElementById('classSelect').value;
        const text = document.getElementById('rawNames').value;
        const names = text.split(/[\s,]+/).filter(n => n.trim() !== "");
        allData[classNum] = names;
        localStorage.setItem('mathClassData', JSON.stringify(allData));
        loadClassData();
    }

    function loadClassData() {
        const classNum = document.getElementById('classSelect').value;
        currentRemaining = [...(allData[classNum] || [])];
        document.getElementById('count').innerText = currentRemaining.length;
        document.getElementById('display-area').innerText = "준비 완료!";
        document.getElementById('rawNames').value = (allData[classNum] || []).join(", ");
    }

    function pick() {
        if (currentRemaining.length === 0) {
            alert("뽑을 학생이 없습니다! 명단을 확인해 주세요.");
            return;
        }

        const display = document.getElementById('display-area');
        const bgm = document.getElementById('bgm');
        const winSound = document.getElementById('winSound');
        const isRemove = document.getElementById('removeOption').checked;
        const btn = document.getElementById('pickBtn');

        btn.disabled = true;
        bgm.play().catch(() => {}); // 브라우저 정책상 첫 클릭시 재생 가능

        let count = 0;
        const timer = setInterval(() => {
            const tempIdx = Math.floor(Math.random() * currentRemaining.length);
            display.innerText = currentRemaining[tempIdx];
            count++;

            if (count > 15) { // 15번 셔플 후 정지
                clearInterval(timer);
                bgm.pause();
                bgm.currentTime = 0; // 음악 초기화

                const finalIdx = Math.floor(Math.random() * currentRemaining.length);
                const picked = currentRemaining[finalIdx];
                
                display.innerText = picked;
                display.style.transform = "scale(1.1)";
                display.style.color = "#dc3545";
                winSound.play();

                if (isRemove) {
                    currentRemaining.splice(finalIdx, 1);
                    document.getElementById('count').innerText = currentRemaining.length;
                }

                setTimeout(() => {
                    display.style.transform = "scale(1)";
                    display.style.color = "#0d6efd";
                    btn.disabled = false;
                }, 1000);
            }
        }, 80);
    }

    function resetCurrentClass() {
        if(confirm("이 반의 진행 상황을 초기화하고 명단을 다시 불러올까요?")) {
            loadClassData();
        }
    }

    loadClassData();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
