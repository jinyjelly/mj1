<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 발표자 뽑기 - 파스텔 봄 테마</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary-color: #ff8b94; --accent-color: #a8e6cf; --text-color: #5c4b51; }
        body { background: linear-gradient(135deg, #fff1eb 0%, #ace0f9 100%); font-family: 'Pretendard', sans-serif; color: var(--text-color); min-height: 100vh; }
        .main-container { max-width: 700px; margin: 40px auto; padding-bottom: 40px; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 28px; box-shadow: 0 15px 35px rgba(255, 139, 148, 0.2); padding: 35px; border: 1px solid rgba(255, 255, 255, 0.8); }
        #display-area { height: 220px; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; font-weight: 900; color: var(--primary-color); background: #fff; border-radius: 24px; margin-bottom: 25px; border: 3px dashed #ffc6c9; text-shadow: 2px 2px 4px rgba(0,0,0,0.02); transition: all 0.2s ease-in-out; padding: 0 20px; text-align: center; word-break: keep-all; }
        .student-list-container { background: rgba(255, 255, 255, 0.6); border-radius: 18px; padding: 15px; border: 1px solid #fce3e4; min-height: 120px; max-height: 180px; overflow-y: auto; transition: all 0.3s ease; }
        .student-chip { display: inline-block; padding: 6px 14px; margin: 4px; background: #fff; border-radius: 20px; font-size: 0.95rem; color: #7a6b71; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #f5ecee; transition: all 0.3s; }
        .student-chip.picked { background: #f7f1f2; color: #d1b8c0; text-decoration: line-through; box-shadow: none; border: none; }
        .counter-btn { background: #fff; color: var(--primary-color); font-weight: 900; font-size: 1.2rem; width: 45px; border: none; transition: 0.2s; cursor: pointer; }
        .btn-main { border-radius: 16px; padding: 15px 25px; font-weight: 800; font-size: 1.2rem; background-color: var(--primary-color); border: none; color: white; box-shadow: 0 6px 15px rgba(255, 139, 148, 0.3); transition: 0.3s; }
        .btn-main:hover:not(:disabled) { background-color: #ff7480; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 139, 148, 0.4); }
        .btn-main:disabled { background-color: #fcaeb3; }
        .btn-option { border-radius: 12px; padding: 12px; font-weight: 700; transition: all 0.2s; }
        .btn-outline-custom { color: #b28b97; border-color: #e6d3d8; background: #fff; }
        .toggle-switch-wrapper { background: #fff; border: 1px solid #e6d3d8; border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.2s; }
        .btn-config { border-radius: 12px; font-weight: bold; color: #5c4b51; background: #fff; }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="glass-card text-center">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0" style="color: #5c4b51;">🌸 발표자 뽑기</h3>
            <button class="btn btn-light btn-config shadow-sm border-0" data-bs-toggle="modal" data-bs-target="#adminModal">⚙️ 학급 관리</button>
        </div>

        <div class="mb-4">
            <select id="classSelect" class="form-select form-select-lg border-0 rounded-4 fw-bold text-center shadow-sm" style="background-color: #fff; color: var(--text-color);" onchange="renderUI(true)">
            </select>
        </div>

        <div id="display-area">반 추가 필요</div>
        
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-end mb-2 px-2">
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-bold" style="color: #8c7b81;">학생 현황</span>
                    <button id="toggleListBtn" onclick="toggleList()" class="btn btn-sm shadow-sm" style="background: #fff; border: 1px solid #fce3e4; color: #b28b97; border-radius: 10px; font-size: 0.8rem; padding: 4px 10px; font-weight: bold;">
                        🙈 명단 숨기기
                    </button>
                </div>
                <span id="statText" class="badge rounded-pill" style="background-color: #ffccd0; color: #d65a62; font-size: 0.85rem;">총 0명 / 남은 0명</span>
            </div>
            <div id="studentListBox" class="student-list-container text-start shadow-sm"></div>
        </div>

        <div class="d-flex justify-content-center align-items-center gap-3 mb-4 p-3 rounded-4" style="background: rgba(255,255,255,0.5);">
            <span class="fw-bold" style="color: #8c7b81; font-size: 1.1rem;">발표 인원</span>
            <div class="input-group shadow-sm" style="width: 140px; border-radius: 16px; overflow: hidden; border: 2px solid #fff;">
                <button class="counter-btn" onclick="adjustCount(-1)">-</button>
                <input type="text" id="pickCount" class="form-control text-center border-0 fw-bold" value="1" readonly style="background: #fff; color: var(--primary-color); font-size: 1.2rem;">
                <button class="counter-btn" onclick="adjustCount(1)">+</button>
            </div>
            <span class="fw-bold" style="color: #8c7b81; font-size: 1.1rem;">명</span>
        </div>

        <div class="d-grid gap-3">
            <button id="pickBtn" onclick="startRolling()" class="btn btn-main" disabled>두구두구 뽑기 시작! 🎶</button>
            <div class="row g-2">
                <div class="col-6">
                    <button onclick="resetCurrentClass()" class="btn btn-outline-custom btn-option w-100 shadow-sm" id="resetBtn" disabled>🔄 명단 초기화</button>
                </div>
                <div class="col-6">
                    <label class="toggle-switch-wrapper shadow-sm active" id="toggleWrapper">
                        <span class="fw-bold" style="color: #b28b97;" id="toggleText">당첨자 제외 켜짐</span>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input fs-5" type="checkbox" role="switch" id="removeOption" checked onchange="toggleRemoveOption()">
                        </div>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="winnerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content shadow-lg border-0 rounded-4" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);">
            <div class="modal-body p-5 text-center" style="color: #fff;">
                <h4 class="mb-3" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">🎉 오늘의 발표자 🎉</h4>
                <h1 class="display-1 fw-bold mb-0" style="text-shadow: 2px 2px 5px rgba(0,0,0,0.15); word-break: keep-all;" id="winnerName">학생이름</h1>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="adminModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4" style="background: #fffafb;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" style="color: var(--text-color);">학급 및 명단 관리</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="row g-4">
                    <div class="col-md-5">
                        <label class="fw-bold mb-2" style="color: var(--primary-color);">1. 반 만들기</label>
                        <div class="input-group mb-3 shadow-sm rounded-3">
                            <input type="text" id="newClassName" class="form-control border-0" placeholder="예: 3반">
                            <button class="btn text-white" style="background-color: var(--primary-color);" onclick="addClass()">추가</button>
                        </div>
                        <ul id="classListGroup" class="list-group shadow-sm border-0 rounded-3"></ul>
                    </div>
                    <div class="col-md-7">
                        <label class="fw-bold mb-2" style="color: var(--primary-color);">2. 명단 넣기 <span id="editingClassName" style="color: #b28b97; font-size: 0.85rem;"></span></label>
                        <textarea id="bulkNameInput" class="form-control border-0 shadow-sm rounded-3" rows="8" placeholder="반을 먼저 추가하고 선택한 뒤, 여기에 명단을 붙여넣으세요." disabled></textarea>
                        <button class="btn w-100 mt-3 fw-bold text-white shadow-sm" style="background-color: #a1c4fd; border-radius: 12px;" onclick="saveBulkNames()" id="saveNamesBtn" disabled>명단 저장하기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 🎵 오디오 엔진 업데이트: 팡파르 & 폭죽 소리 생성기 🎵 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400 + Math.random() * 200, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // 🎇 폭죽 터지는 소리 (노이즈 활용)
    function playFireworkSound() {
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
        
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start();
    }

    // 🎺 승리의 팡파르 연주
    function playFanfare() {
        const notes = [523.25, 659.25, 783.99, 1046.50]; // 도, 미, 솔, 도 (C Major)
        notes.forEach((freq, i) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
                if(i === notes.length - 1) playFireworkSound(); // 마지막 음에 폭죽 쾅!
            }, i * 150);
        });
    }
    // -------------------------------------------------------------------

    let pickerDB = JSON.parse(localStorage.getItem('mathPickerDB_v3')) || {};
    let currentClass = Object.keys(pickerDB)[0] || "";
    let isListVisible = true;

    window.onload = () => { updateClassDropdown(); updateAdminModalList(); renderUI(true); toggleRemoveOption(); };

    function updateClassDropdown() {
        const select = document.getElementById('classSelect');
        const keys = Object.keys(pickerDB);
        if (keys.length === 0) { select.innerHTML = '<option value="">-- 반을 추가해주세요 --</option>'; select.disabled = true; } 
        else { select.disabled = false; select.innerHTML = keys.map(name => `<option value="${name}" ${name === currentClass ? 'selected' : ''}>${name}</option>`).join(''); }
    }

    function renderUI(resetDisplay = false) {
        currentClass = document.getElementById('classSelect').value || "";
        const listBox = document.getElementById('studentListBox');
        const display = document.getElementById('display-area');
        const bulkInput = document.getElementById('bulkNameInput');
        const saveBtn = document.getElementById('saveNamesBtn');
        const pickBtn = document.getElementById('pickBtn');
        const resetBtn = document.getElementById('resetBtn');

        if (!currentClass) {
            document.getElementById('statText').innerText = `총 0명 / 남은 0명`;
            listBox.innerHTML = '<div class="text-center text-muted mt-4">⚙️ 관리 버튼을 눌러 반을 생성하세요.</div>';
            if (resetDisplay) display.innerText = "반 추가 필요";
            bulkInput.disabled = true; saveBtn.disabled = true; pickBtn.disabled = true; resetBtn.disabled = true;
            return;
        }

        const data = pickerDB[currentClass];
        const remainCount = data.total.length - data.picked.length;
        document.getElementById('statText').innerText = `총 ${data.total.length}명 / 남은 ${remainCount}명`;
        
        if (data.total.length === 0) { listBox.innerHTML = '<div class="text-center text-muted mt-4">명단을 넣어주세요.</div>'; if (resetDisplay) display.innerText = "명단 입력 대기"; pickBtn.disabled = true; } 
        else {
            listBox.innerHTML = data.total.map(name => `<span class="student-chip ${data.picked.includes(name) ? 'picked' : ''}">${name}</span>`).join('');
            if (resetDisplay) display.innerText = "Ready!";
            pickBtn.disabled = false;
        }
        resetBtn.disabled = false; bulkInput.disabled = false; saveBtn.disabled = false;
        bulkInput.value = data.total.join(' ');
        checkMaxCount(); applyListVisibility(); 
    }

    function toggleList() { isListVisible = !isListVisible; applyListVisibility(); }
    function applyListVisibility() {
        const listContainer = document.getElementById('studentListBox');
        const btn = document.getElementById('toggleListBtn');
        if (isListVisible) { listContainer.style.display = 'block'; btn.innerText = '🙈 명단 숨기기'; } 
        else { listContainer.style.display = 'none'; btn.innerText = '👁️ 명단 보이기'; }
    }

    function toggleRemoveOption() {
        const isChecked = document.getElementById('removeOption').checked;
        const text = document.getElementById('toggleText');
        document.getElementById('toggleWrapper').classList.toggle('active', isChecked);
        text.innerText = isChecked ? "당첨자 제외 켜짐" : "당첨자 포함 (중복가능)";
        text.style.color = isChecked ? "#ff8b94" : "#b28b97";
        checkMaxCount();
    }

    function adjustCount(amount) {
        const input = document.getElementById('pickCount');
        let next = (parseInt(input.value) || 1) + amount;
        const data = pickerDB[currentClass];
        if (data) {
            const poolSize = document.getElementById('removeOption').checked ? data.total.length - data.picked.length : data.total.length;
            if (next > poolSize) next = poolSize;
        }
        input.value = Math.max(1, next || 1);
    }
    function checkMaxCount() { adjustCount(0); }

    function addClass() {
        const name = document.getElementById('newClassName').value.trim();
        if (name && !pickerDB[name]) { pickerDB[name] = { total: [], picked: [] }; currentClass = name; saveAndRefresh(true); }
        document.getElementById('newClassName').value = '';
    }

    function deleteClass(name) { if (confirm(`'${name}'을(를) 삭제할까요?`)) { delete pickerDB[name]; currentClass = Object.keys(pickerDB)[0] || ""; saveAndRefresh(true); } }
    function saveBulkNames() {
        const names = document.getElementById('bulkNameInput').value.split(/[\s,]+/).filter(n => n.trim() !== "");
        pickerDB[currentClass].total = names; pickerDB[currentClass].picked = [];
        saveAndRefresh(true);
    }
    function resetCurrentClass() { if (confirm("기록을 초기화할까요?")) { pickerDB[currentClass].picked = []; saveAndRefresh(true); } }

    function startRolling() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const data = pickerDB[currentClass];
        const pool = document.getElementById('removeOption').checked ? data.total.filter(n => !data.picked.includes(n)) : data.total;
        let pickCount = parseInt(document.getElementById('pickCount').value) || 1;

        if (pool.length === 0 || pickCount > pool.length) return alert("인원수를 확인해주세요!");

        const display = document.getElementById('display-area');
        const btn = document.getElementById('pickBtn');
        btn.disabled = true;

        let count = 0;
        const timer = setInterval(() => {
            display.innerText = pool[Math.floor(Math.random() * pool.length)];
            playBeep();
            if (++count > 25) {
                clearInterval(timer);
                playFanfare(); // 🎉 팡파르 & 폭죽 소리!!
                
                let tempPool = [...pool];
                let finalWinners = [];
                for(let i=0; i<pickCount; i++) finalWinners.push(tempPool.splice(Math.floor(Math.random() * tempPool.length), 1)[0]);
                
                display.innerText = finalWinners.join(', ');
                display.style.fontSize = finalWinners.join(', ').length > 15 ? "2rem" : "3rem";

                if (document.getElementById('removeOption').checked) data.picked.push(...finalWinners);
                saveAndRefresh(false);
                btn.disabled = false;

                document.getElementById('winnerName').innerText = finalWinners.join(', ');
                new bootstrap.Modal(document.getElementById('winnerModal')).show();

                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ffb7b2', '#e2f0cb', '#b5ead7', '#c7ceea', '#ffdac1'] });
            }
        }, 60);
    }

    function saveAndRefresh(resetDisplay = false) {
        localStorage.setItem('mathPickerDB_v3', JSON.stringify(pickerDB));
        updateClassDropdown(); updateAdminModalList(); renderUI(resetDisplay);
    }

    function updateAdminModalList() {
        document.getElementById('classListGroup').innerHTML = Object.keys(pickerDB).map(name => `
            <li class="list-group-item d-flex justify-content-between align-items-center" style="background:transparent; border-bottom:1px solid #eee;">
                <strong>${name}</strong>
                <button class="btn btn-sm text-danger border-0" style="background:#ffeeef;" onclick="deleteClass('${name}')">삭제</button>
            </li>`).join('');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
