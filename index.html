<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 발표자 뽑기 - 수학 시간</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary-color: #4a90e2; --accent-color: #ff6b6b; }
        body { background-color: #f4f7fa; font-family: 'Pretendard', sans-serif; color: #333; }
        .main-container { max-width: 700px; margin: 40px auto; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 30px; border: 1px solid #fff;
        }
        #display-area { 
            height: 220px; display: flex; align-items: center; justify-content: center; 
            font-size: 4.5rem; font-weight: 900; color: var(--primary-color); 
            background: #fff; border-radius: 20px; margin-bottom: 25px;
            border: 3px solid #eef2f7; text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }
        .student-list-container {
            background: #fdfdfd; border-radius: 15px; padding: 15px;
            border: 1px solid #edf2f7; min-height: 120px; max-height: 180px; overflow-y: auto;
        }
        .student-chip {
            display: inline-block; padding: 4px 12px; margin: 4px;
            background: #eef2f7; border-radius: 20px; font-size: 0.9rem; color: #666;
        }
        .student-chip.picked { background: #fee; color: #fcc; text-decoration: line-through; }
        .btn-main { border-radius: 12px; padding: 12px 25px; font-weight: 700; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="glass-card text-center">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">🎲 발표자 뽑기</h3>
            <button class="btn btn-light border shadow-sm" data-bs-toggle="modal" data-bs-target="#adminModal">⚙️ 학급 관리</button>
        </div>

        <div class="mb-4">
            <select id="classSelect" class="form-select form-select-lg border-0 bg-light rounded-4 fw-bold text-center" onchange="renderUI()">
            </select>
        </div>

        <div id="display-area">반 추가 필요</div>
        
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-end mb-2">
                <span class="fw-bold text-secondary">학생 현황</span>
                <span id="statText" class="badge text-bg-light">총 0명 / 남은 0명</span>
            </div>
            <div id="studentListBox" class="student-list-container text-start">
            </div>
        </div>

        <div class="d-grid gap-3">
            <button id="pickBtn" onclick="startRolling()" class="btn btn-primary btn-lg btn-main shadow-sm" disabled>뽑기 시작</button>
            <div class="btn-group w-100 shadow-sm">
                <button onclick="resetCurrentClass()" class="btn btn-outline-warning border-2 fw-bold" id="resetBtn" disabled>명단 초기화</button>
                <input type="checkbox" class="btn-check" id="removeOption" checked>
                <label class="btn btn-outline-danger border-2 fw-bold" for="removeOption">당첨자 제외</label>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="winnerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0 rounded-4" style="background: linear-gradient(135deg, #4a90e2, #6a11cb);">
            <div class="modal-body p-5 text-center text-white">
                <h4 class="mb-3 opacity-75">🎉 오늘의 발표자 🎉</h4>
                <h1 class="display-1 fw-bold mb-0 text-shadow" id="winnerName">학생이름</h1>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="adminModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">학급 및 명단 관리</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="row g-4">
                    <div class="col-md-5">
                        <label class="fw-bold mb-2 text-primary">1. 반 만들기</label>
                        <div class="input-group mb-3">
                            <input type="text" id="newClassName" class="form-control" placeholder="예: 3반">
                            <button class="btn btn-primary" onclick="addClass()">추가</button>
                        </div>
                        <ul id="classListGroup" class="list-group shadow-sm"></ul>
                    </div>
                    <div class="col-md-7">
                        <label class="fw-bold mb-2 text-primary">2. 명단 넣기 <span id="editingClassName" class="text-danger small"></span></label>
                        <textarea id="bulkNameInput" class="form-control" rows="8" placeholder="반을 먼저 추가하고 선택한 뒤, 여기에 명단을 붙여넣으세요." disabled></textarea>
                        <button class="btn btn-dark w-100 mt-3 fw-bold" onclick="saveBulkNames()" id="saveNamesBtn" disabled>명단 저장하기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let pickerDB = JSON.parse(localStorage.getItem('mathPickerDB_v3')) || {};
    let currentClass = Object.keys(pickerDB)[0] || "";

    window.onload = () => {
        updateClassDropdown();
        updateAdminModalList();
        renderUI();
    };

    function updateClassDropdown() {
        const select = document.getElementById('classSelect');
        const keys = Object.keys(pickerDB);
        
        if (keys.length === 0) {
            select.innerHTML = '<option value="">-- 반을 추가해주세요 --</option>';
            select.disabled = true;
        } else {
            select.disabled = false;
            select.innerHTML = keys.map(name => 
                `<option value="${name}" ${name === currentClass ? 'selected' : ''}>${name}</option>`
            ).join('');
        }
    }

    function renderUI() {
        currentClass = document.getElementById('classSelect').value || "";
        const listBox = document.getElementById('studentListBox');
        const display = document.getElementById('display-area');
        const bulkInput = document.getElementById('bulkNameInput');
        const saveBtn = document.getElementById('saveNamesBtn');
        const pickBtn = document.getElementById('pickBtn');
        const resetBtn = document.getElementById('resetBtn');

        if (!currentClass) {
            document.getElementById('statText').innerText = `총 0명 / 남은 0명`;
            listBox.innerHTML = '<div class="text-center text-muted mt-4">⚙️ 우측 상단의 관리 버튼을 눌러 반을 생성하세요.</div>';
            display.innerText = "반 추가 필요";
            document.getElementById('editingClassName').innerText = "(선택된 반 없음)";
            bulkInput.value = ""; bulkInput.disabled = true;
            saveBtn.disabled = true; pickBtn.disabled = true; resetBtn.disabled = true;
            return;
        }

        const data = pickerDB[currentClass];
        const remainCount = data.total.length - data.picked.length;
        
        document.getElementById('statText').innerText = `총 ${data.total.length}명 / 남은 ${remainCount}명`;
        
        if (data.total.length === 0) {
            listBox.innerHTML = '<div class="text-center text-muted mt-4">명단이 비어있습니다. 관리 메뉴에서 명단을 넣어주세요.</div>';
            display.innerText = "명단 입력 대기";
            pickBtn.disabled = true;
        } else {
            listBox.innerHTML = data.total.map(name => {
                const isPicked = data.picked.includes(name);
                return `<span class="student-chip ${isPicked ? 'picked' : ''}">${name}</span>`;
            }).join('');
            display.innerText = "Ready!";
            pickBtn.disabled = false;
        }

        resetBtn.disabled = false;
        document.getElementById('editingClassName').innerText = `[ ${currentClass} 편집 중 ]`;
        bulkInput.disabled = false; saveBtn.disabled = false;
        bulkInput.value = data.total.join(' ');
    }

    function addClass() {
        const name = document.getElementById('newClassName').value.trim();
        if (!name) return alert("반 이름을 입력해주세요!");
        if (pickerDB[name]) return alert("이미 존재하는 반 이름입니다.");
        
        pickerDB[name] = { total: [], picked: [] };
        currentClass = name;
        document.getElementById('newClassName').value = '';
        saveAndRefresh();
    }

    function deleteClass(name) {
        if (confirm(`정말 '${name}'을(를) 삭제하시겠습니까?`)) {
            delete pickerDB[name];
            currentClass = Object.keys(pickerDB)[0] || "";
            saveAndRefresh();
        }
    }

    function saveBulkNames() {
        if (!currentClass) return;
        const raw = document.getElementById('bulkNameInput').value;
        const names = raw.split(/[\s,]+/).filter(n => n.trim() !== "");
        
        pickerDB[currentClass].total = names;
        pickerDB[currentClass].picked = [];
        saveAndRefresh();
        alert(`[${currentClass}] 명단이 저장되었습니다.`);
    }

    function resetCurrentClass() {
        if (currentClass && confirm("이미 발표한 아이들의 기록을 모두 지우고 다시 꽉 채울까요?")) {
            pickerDB[currentClass].picked = [];
            saveAndRefresh();
        }
    }

    function startRolling() {
        const data = pickerDB[currentClass];
        const isRemove = document.getElementById('removeOption').checked;
        const pool = isRemove ? data.total.filter(n => !data.picked.includes(n)) : data.total;

        if (pool.length === 0) return alert("모든 학생이 발표했습니다! 명단을 초기화해주세요.");

        const display = document.getElementById('display-area');
        const btn = document.getElementById('pickBtn');
        btn.disabled = true;

        let count = 0;
        const timer = setInterval(() => {
            // 돌아가는 중에는 화면 가운데 글씨만 바뀝니다.
            display.innerText = pool[Math.floor(Math.random() * pool.length)];
            count++;
            
            if (count > 25) {
                clearInterval(timer);
                
                // 최종 당첨자 결정!
                const final = pool[Math.floor(Math.random() * pool.length)];
                display.innerText = final;

                // 중복 제외 처리
                if (isRemove) {
                    data.picked.push(final);
                    saveAndRefresh();
                }
                btn.disabled = false;

                // 🌟 추가된 기능: 팝업 띄우기 및 폭죽 효과 🌟
                document.getElementById('winnerName').innerText = final; // 팝업창 이름 변경
                const winnerModal = new bootstrap.Modal(document.getElementById('winnerModal'));
                winnerModal.show(); // 팝업창 띄우기

                // 폭죽 팡팡!
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
                });
            }
        }, 50);
    }

    function saveAndRefresh() {
        localStorage.setItem('mathPickerDB_v3', JSON.stringify(pickerDB));
        updateClassDropdown();
        updateAdminModalList();
        renderUI();
    }

    function updateAdminModalList() {
        const listGroup = document.getElementById('classListGroup');
        const keys = Object.keys(pickerDB);
        
        if (keys.length === 0) {
            listGroup.innerHTML = '<li class="list-group-item text-muted small">등록된 반이 없습니다.</li>';
            return;
        }

        listGroup.innerHTML = keys.map(name => `
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <strong>${name}</strong>
                <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteClass('${name}')">삭제</button>
            </li>
        `).join('');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
